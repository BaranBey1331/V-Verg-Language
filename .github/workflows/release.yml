name: V-Verg-Language Release

on:
  push:
    tags:
      - 'v*' # Sadece v ile başlayan tag'ler atıldığında çalışır (v1.0.0, v2.1.0 vb.)
  workflow_dispatch:

permissions:
  contents: write # Gerçek bir release oluşturmak için zorunlu yetki

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Versiyon Bilgisini Yakala
        id: get_version
        run: |
          # Eğer bir tag pushlandıysa o tagı al, manuel tetiklendiyse dev versiyonu ata
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "VERSION=v0.0.0-dev" >> $GITHUB_ENV
          fi

      - name: Projeyi Derle / Çevir
        run: |
          echo "Otomatik çeviri ve derleme işlemi başlatılıyor..."
          mkdir -p release_build
          rsync -av --exclude='.git' --exclude='.github' ./ release_build/

      - name: Projeyi Paketle
        run: |
          cd release_build
          zip -r ../V-Verg-Language-${{ env.VERSION }}.zip .
          tar -czvf ../V-Verg-Language-${{ env.VERSION }}.tar.gz .
          cd ..

      - name: Pro Seviye Akıllı Kurulum Betiği Hazırla (install.sh)
        run: |
          cat << 'EOF' > install.sh
          #!/bin/bash
          set -e # Herhangi bir komut hata verirse kurulumu durdur

          REPO="BaranBey1331/V-Verg-Language"
          # Workflow çalışırken bu değişken o anki sürüme (örn: v1.0.0) dönüşecek
          VERSION="${{ env.VERSION }}"
          
          echo "🚀 V-Verg-Language ($VERSION) Kurulumu Başlıyor..."

          RELEASE_URL="https://github.com/$REPO/releases/download/$VERSION/V-Verg-Language-$VERSION.zip"
          MAIN_REPO_URL="https://github.com/$REPO/archive/refs/heads/main.zip"
          
          download_file() {
            if command -v curl >/dev/null 2>&1; then
              curl -fsSL "$1" -o v-project.zip
              return $?
            elif command -v wget >/dev/null 2>&1; then
              wget -qO v-project.zip "$1"
              return $?
            else
              echo "❌ Hata: curl veya wget bulunamadı! Lütfen kurun (örn: pkg install curl wget unzip)"
              exit 1
            fi
          }
          
          echo "📦 Sürüm dosyaları indiriliyor..."
          if download_file "$RELEASE_URL" && [ -s v-project.zip ]; then
            echo "✅ Release sürümü başarıyla indirildi!"
          else
            echo "⚠️ Release arşivi bulunamadı, ana repodan en güncel kodlar çekiliyor..."
            download_file "$MAIN_REPO_URL"
          fi
          
          echo "📂 Arşiv çıkartılıyor..."
          if command -v unzip >/dev/null 2>&1; then
            unzip -q -o v-project.zip -d V-Verg-Language
          else
            echo "❌ Hata: unzip bulunamadı! Lütfen kurun: pkg install unzip"
            exit 1
          fi
          
          rm -f v-project.zip
          echo "🎉 Kurulum tamamlandı! Projeye girmek için: cd V-Verg-Language"
          EOF
          chmod +x install.sh

      - name: Workflow Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: V-Verg-Language-${{ env.VERSION }}-builds
          path: |
            V-Verg-Language-${{ env.VERSION }}.zip
            V-Verg-Language-${{ env.VERSION }}.tar.gz
            install.sh
          retention-days: 90

      - name: Gerçek GitHub Release Oluştur ve Yayınla
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.VERSION }} \
            V-Verg-Language-${{ env.VERSION }}.zip \
            V-Verg-Language-${{ env.VERSION }}.tar.gz \
            install.sh \
            --title "V-Verg-Language Release ${{ env.VERSION }}" \
            --generate-notes
