name: V Project Release

on:
  push:
    tags:
      - 'v*' # v1.0.0 gibi bir tag ile tetiklenir
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Projeyi Paketle (.zip ve .tar.gz)
        run: |
          mkdir -p release_build
          # Gizli git dosyaları hariç projeyi kopyala
          rsync -av --exclude='.git' --exclude='.github' ./ release_build/
          
          # ZIP Olarak Paketle
          cd release_build
          zip -r ../v-project-v1.0.0.zip .
          
          # TAR.GZ Olarak Paketle
          tar -czvf ../v-project-v1.0.0.tar.gz .
          cd ..

      - name: Termux / Wget / cURL Kurulum Betiği Hazırla
        run: |
          cat << 'EOF' > install.sh
          #!/bin/bash
          echo "V Projesi (v1.0.0) İndiriliyor..."
          
          REPO="${{ github.repository }}"
          VERSION="v1.0.0"
          ZIP_URL="https://github.com/$REPO/releases/download/$VERSION/v-project-$VERSION.zip"
          
          # Wget veya cURL kontrolü
          if command -v wget >/dev/null 2>&1; then
            wget -qO v-project.zip "$ZIP_URL"
          elif command -v curl >/dev/null 2>&1; then
            curl -sL "$ZIP_URL" -o v-project.zip
          else
            echo "Hata: curl veya wget bulunamadı! Lütfen Termux'ta 'pkg install curl wget unzip' çalıştırın."
            exit 1
          fi
          
          echo "ZIP arşivi çıkartılıyor..."
          if command -v unzip >/dev/null 2>&1; then
            unzip -o v-project.zip -d v-project
          else
            echo "Hata: unzip bulunamadı! Lütfen kurun: pkg install unzip"
            exit 1
          fi
          
          rm v-project.zip
          echo "Kurulum tamamlandı! Dosyalar 'v-project' klasöründe."
          EOF
          chmod +x install.sh

      - name: Workflow Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: v-project-v1.0.0-builds
          path: |
            v-project-v1.0.0.zip
            v-project-v1.0.0.tar.gz
            install.sh
          retention-days: 90 # Artifact'in saklanma süresi (opsiyonel)

      - name: V1.0.0 Sürümünü Yayınla (Release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: V Projesi Release v1.0.0
          draft: false
          prerelease: false
          files: |
            v-project-v1.0.0.zip
            v-project-v1.0.0.tar.gz
            install.sh
